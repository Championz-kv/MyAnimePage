<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>My Anime Page</title>
        <link rel="stylesheet" href="style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Foldit:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="background-lines"></div>

        <div class="page-container">

            <header>
                <h1>My Anime Page</h1>
                <p id="header-text">
                    Animes I've watched so far...
                </p>

                        <div class="mode-controls">
                            
                            <button id="mode-watched-btn">
                                Check out watched animes
                            </button>
                            <button id="mode-watching-btn">
                                Check out currently watching animes
                            </button>
                            <button id="mode-plan-btn">
                                Check out "to watch" anime plans
                            </button>

                        </div>

                        <div class="controls" id="main-controls">

                            <button id="sort-btn-alpha">▼ A to Z</button>
                            <button id="sort-btn-time">Released</button>
                            <select id="theme-select">
                                <option value="">Anime Theme</option>
                                <option value="cb">Conflict & Battle</option>
                                <option value="ga">Growth & Adventure</option>
                                <option value="lp">Love & Peace</option>
                                <option value="mp">Mind & Psychology</option>
                            </select>
                            <input id="search-box" type="text" placeholder="Search anime 🔍">

                        </div>
                        <div id="selected-themes"></div>
                <p id="anime-count"></p>
            </header>

            <main>
                <section class="anime-grid" id="anime-grid">
                </section>
            </main>

            <footer>
                <p>Made by Championz • 2026</p>
                <p><a href="https://www.discord.com/users/803827843624337438" target="_blank" rel="noopener noreferrer" class="footer-link">Discord / championz_</a> | <a href="https://github.com/Championz-kv" target="_blank" rel="noopener noreferrer" class="footer-link">Github / Championz-kv</a></p><br>Also check out -> <a href="https://myriddlepage.vercel.app" target="_blank" rel="noopener noreferrer" class="footer-link">My Riddle Page</a>
                <br><br><a href="/mod" class="footer-link">Edit List - Mod Page</a>
                <p>Enjoy Life</p>
            </footer>
            
        </div>
    <script src="animedata.js"></script>
    <script src="script.js"></script>
    </body>
</html>
