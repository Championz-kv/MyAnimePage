<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyAnimePage — Mod Login</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="/mod/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>MyAnimePage</h1>
      <p class="subtitle">Mod / Admin Panel</p>

      <div id="errorMsg" class="error-msg"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-block" id="loginBtn">Log In</button>
      </form>
      <a href="/" class="back-link">&larr; Back to Main Site</a>
    </div>
  </div>

  <script src="/mod/js/login.js"></script>
</body>
</html>
