<html>
    <head>
        <title>My Anime Page</title>
        <link rel="stylesheet" href="style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Foldit:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    </head>
    <body>
        <div class="background-lines"></div>

        <div class="page-container">
            <header>
                <h1>My Anime Page</h1>
                <p>
                    All the animes I've watched so far...
                </p>
                        <div class="controls">
                            <button id="sort-btn-alpha">▼ A to Z</button>
                            <button id="sort-btn-time">Released</button>
                        </div>
            </header>

            <main>
                <section class="anime-grid" id="anime-grid">

                </section>
            </main>

            <footer>
                <p id="anime-count"></p>
                <p>Made by Championz • 2026</p>
            </footer>
        </div>

    <script src="script.js"></script>
    </body>
</html>
